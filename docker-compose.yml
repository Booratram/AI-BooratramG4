services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: booratramg4-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: booratramg4
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booratramg4"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: booratramg4-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: booratramg4-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3003:3003"
    volumes:
      - ./backend:/app/backend
      - ./package.json:/app/package.json
    command: npm run start:dev

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: booratramg4-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - ./package.json:/app/package.json
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres-data:

