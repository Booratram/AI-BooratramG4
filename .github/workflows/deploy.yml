name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:
    inputs:
      action:
        description: Deployment action
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - rollback
      target_sha:
        description: Optional commit SHA to deploy or roll back to
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

jobs:
  deploy:
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Resolve target SHA
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.target_sha }}" ]]; then
            echo "sha=${{ github.event.inputs.target_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy secrets
        shell: bash
        run: |
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deployment host to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy target release
        shell: bash
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && bash ops/deploy/deploy.sh '${{ steps.target.outputs.sha }}'"

  rollback:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'rollback'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Validate deploy secrets
        shell: bash
        run: |
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH; do
            if [[ -z "${!key}" ]]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deployment host to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Roll back release
        shell: bash
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && bash ops/deploy/rollback.sh '${{ github.event.inputs.target_sha }}'"