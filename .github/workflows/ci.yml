name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm --workspace backend run prisma:generate
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test
      - run: npm run e2e:playwright